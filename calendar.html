<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conference Calendar | UM Psychiatry Research Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    .calendar-hero {
      background: linear-gradient(135deg, #005030 0%, #007a47 100%);
      color: white;
      padding: 60px 24px 48px;
      text-align: center;
    }
    .calendar-hero h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 12px; }
    .calendar-hero p { font-size: 1.05rem; opacity: 0.88; max-width: 560px; margin: 0 auto; }

    .calendar-container { max-width: 860px; margin: 0 auto; padding: 48px 24px; }

    .loading-state, .empty-state {
      text-align: center; padding: 60px 24px; color: #6b7280;
    }
    .loading-spinner {
      width: 36px; height: 36px; border: 3px solid #e5e7eb;
      border-top-color: #005030; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .conf-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }
    .conf-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

    .conf-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #111827; margin-bottom: 4px; }
